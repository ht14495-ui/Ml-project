<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Student Exam Performance Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            background:linear-gradient(135deg,#5b86e5,#36d1dc);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;

        }

        .container{

            width:500px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,.3);

        }

        h1{

            text-align:center;
            margin-bottom:25px;
            color:#333;

        }

        label{

            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;

        }

        input,select{

            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;

        }

        button{

            width:100%;
            margin-top:25px;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;

        }

        button:hover{

            background:#0056b3;

        }

        .result{

            margin-top:25px;
            text-align:center;
            font-size:24px;
            color:green;
            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="container">

<h1>Student Exam Performance Predictor</h1>

<form action="{{ url_for('predict_datapoint') }}" method="POST">

<label>Gender</label>

<select name="gender" required>

<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>

</select>


<label>Race / Ethnicity</label>

<select name="ethnicity" required>

<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>

</select>


<label>Parental Level of Education</label>

<select name="parental_level_of_education" required>

<option value="bachelor's degree">Bachelor's Degree</option>
<option value="master's degree">Master's Degree</option>
<option value="associate's degree">Associate's Degree</option>
<option value="some college">Some College</option>
<option value="high school">High School</option>
<option value="some high school">Some High School</option>

</select>


<label>Lunch Type</label>

<select name="lunch" required>

<option value="standard">Standard</option>
<option value="free/reduced">Free / Reduced</option>

</select>


<label>Test Preparation Course</label>

<select name="test_preparation_course" required>

<option value="completed">Completed</option>
<option value="none">None</option>

</select>


<label>Reading Score</label>

<input
type="number"
name="reading_score"
min="0"
max="100"
required>


<label>Writing Score</label>

<input
type="number"
name="writing_score"
min="0"
max="100"
required>


<button type="submit">
Predict Maths Score
</button>

</form>

<div class="result">

{% if results %}

Predicted Maths Score : <br><br>

{{ results }}

{% endif %}

</div>

</div>

</body>

</html>
